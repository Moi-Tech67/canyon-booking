<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Scanner | The Canyon</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #F5F2EB; padding: 2rem; text-align: center; }
        #reader { width: 300px; margin: 2rem auto; border: 2px solid #C4A962; border-radius: 8px; }
        .result { margin: 1rem; font-size: 1.2rem; }
        button { background: #C4A962; color: white; border: none; padding: 0.8rem 2rem; font-size: 1rem; cursor: pointer; margin: 0.5rem; border-radius: 4px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #manualInput { padding: 0.8rem; width: 200px; }
    </style>
</head>
<body>
    <h2>Admin QR Scanner</h2>
    <div id="reader"></div>
    <div class="result" id="scanResult"></div>
    <div>
        <button id="timeInBtn" disabled>Record Time‑In</button>
        <button id="timeOutBtn" disabled>Record Time‑Out</button>
    </div>
    <p>Or enter Booking ID manually:</p>
    <input type="number" id="manualInput" placeholder="Booking ID">
    <button onclick="manualLookup()">Lookup</button>
    <div id="manualResult"></div>

    <script>
        let scannedId = null;
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (decodedText) => {
                scannedId = parseInt(decodedText);
                if (!isNaN(scannedId)) {
                    document.getElementById('scanResult').textContent = `Scanned Booking ID: ${scannedId}`;
                    document.getElementById('timeInBtn').disabled = false;
                    document.getElementById('timeOutBtn').disabled = false;
                } else {
                    document.getElementById('scanResult').textContent = 'Invalid QR code';
                }
            },
            (error) => { /* ignore */ }
        ).catch(err => console.error(err));

        async function recordTime(action) {
            if (!scannedId) return;
            const endpoint = action === 'in' ? '/api/record_time_in' : '/api/record_time_out';
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({booking_id: scannedId})
            });
            const data = await res.json();
            alert(data.message);
        }

        document.getElementById('timeInBtn').onclick = () => recordTime('in');
        document.getElementById('timeOutBtn').onclick = () => recordTime('out');

        async function manualLookup() {
            const id = document.getElementById('manualInput').value;
            if (!id) return;
            const res = await fetch('/api/bookings');
            const bookings = await res.json();
            const booking = bookings.find(b => b.id == id);
            if (booking) {
                document.getElementById('manualResult').innerHTML = `
                    <p>Booking #${booking.id} - ${booking.name}</p>
                    <button onclick="recordManual('in', ${booking.id})">Time‑In</button>
                    <button onclick="recordManual('out', ${booking.id})">Time‑Out</button>
                `;
            } else {
                document.getElementById('manualResult').textContent = 'Booking not found.';
            }
        }

        async function recordManual(action, id) {
            const endpoint = action === 'in' ? '/api/record_time_in' : '/api/record_time_out';
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({booking_id: id})
            });
            const data = await res.json();
            alert(data.message);
        }
    </script>
</body>
</html>
