<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Stay | The Canyon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #F5F2EB; color: #1E1E1E; }
        nav { background: rgba(26,26,26,0.95); padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; letter-spacing: 0.3em; color: #fff; text-decoration: none; text-transform: uppercase; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: #C4A962; }
        section { padding: 8rem 2rem 4rem; max-width: 1200px; margin: 0 auto; }
        .booking-form { background: white; padding: 3rem; box-shadow: 0 15px 35px rgba(0,0,0,0.04); }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem 2rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 0.5rem; }
        .form-group.full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 0.4rem; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: #8B7355; }
        input, select, textarea { width: 100%; padding: 1rem 0.75rem; border: 1px solid #E0DCD3; font-size: 0.9rem; font-family: inherit; background: #FDFCFA; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #C4A962; }
        .price-display { background: #F5F2EB; padding: 1.5rem; margin: 1.5rem 0 2rem; text-align: center; display: none; }
        .price-label { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: #5A4A3A; margin-bottom: 0.5rem; }
        .price-amount { font-size: 2.5rem; font-weight: 400; color: #8B7355; font-family: 'Cormorant Garamond', serif; }
        .price-detail { font-size: 0.8rem; color: #6B6258; margin-top: 0.25rem; }
        .submit-btn { background: #C4A962; color: #fff; border: none; padding: 1rem 2rem; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; cursor: pointer; width: 100%; }
        .submit-btn:hover { background: #1A1A1A; }
        .submit-btn:disabled { background: #C8C2B8; cursor: not-allowed; }
        .message { padding: 1rem; margin: 1.5rem 0; font-size: 0.85rem; display: none; }
        .message.success { background: #E6F0E6; color: #2B5E2B; border-left: 4px solid #2B5E2B; display: block; }
        .message.error { background: #F4E6E6; color: #A12B2B; border-left: 4px solid #A12B2B; display: block; }
        .loading { display: none; text-align: center; padding: 1.5rem; }
        .loading.active { display: block; }
        .spinner { border: 2px solid #F5F2EB; border-top: 2px solid #C4A962; border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; margin-top: 2rem; border-top: 1px solid #E0DCD3; color: #9A9A9A; font-size: 0.8rem; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .form-group.full-width { grid-column: span 1; } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">The Canyon</a>
        <ul class="nav-links">
            <li><a href="/about">About</a></li>
            <li><a href="/accommodation">Rooms</a></li>
            <li><a href="/booking" class="active">Book</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <section>
        <h2 class="section-title" style="font-family:'Cormorant Garamond',serif; font-size:2.8rem; font-weight:300; letter-spacing:0.2em; text-transform:uppercase; text-align:center; margin-bottom:3rem;">Reservations</h2>
        <div class="booking-form">
            <form id="bookingForm">
                <div class="form-grid">
                    <div class="form-group"><label for="name">Full Name *</label><input type="text" id="name" required></div>
                    <div class="form-group"><label for="email">Email Address *</label><input type="email" id="email" required></div>
                    <div class="form-group"><label for="phone">Phone Number *</label><input type="tel" id="phone" required></div>
                    <div class="form-group"><label for="guests">Guests *</label><input type="number" id="guests" min="1" max="10" value="2" required></div>
                    <div class="form-group"><label for="roomType">Room Type *</label><select id="roomType" required><option value="">Select accommodation</option></select></div>
                    <div class="form-group"><label for="checkIn">Check‑in Date *</label><input type="date" id="checkIn" required></div>
                    <div class="form-group"><label for="checkOut">Check‑out Date *</label><input type="date" id="checkOut" required></div>
                    <div class="form-group"><label for="time">Check‑in Time *</label><input type="time" id="time" value="15:00" required></div>
                    <div class="form-group full-width"><label for="specialRequests">Special Requests (optional)</label><textarea id="specialRequests" rows="2"></textarea></div>
                </div>
                <div class="price-display" id="priceDisplay"><div class="price-label">Total Stay</div><div class="price-amount" id="totalPrice">$0</div><div class="price-detail"><span id="nightsCount">0</span> nights · <span id="pricePerNight">$0</span> / night</div></div>
                <div class="loading" id="loadingIndicator"><div class="spinner"></div><p style="margin-top:0.5rem; color:#8B7355;">Processing...</p></div>
                <div class="message" id="message"></div>
                <button type="submit" class="submit-btn" id="submitBtn">Confirm Booking</button>
            </form>
        </div>
    </section>

    <footer>&copy; 2026 The Canyon Hotels & Resorts. All rights reserved.</footer>

    <script>
        const roomTypes = {{ room_types | tojson | safe }};
        const roomSelect = document.getElementById('roomType');
        for (const [type, details] of Object.entries(roomTypes)) {
            const option = document.createElement('option');
            option.value = type;
            option.textContent = `${type} — $${details.price} / night`;
            roomSelect.appendChild(option);
        }

        (function setDefaultDates() {
            const today = new Date();
            const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
            const nextWeek = new Date(today); nextWeek.setDate(nextWeek.getDate()+7);
            document.getElementById('checkIn').value = tomorrow.toISOString().split('T')[0];
            document.getElementById('checkOut').value = nextWeek.toISOString().split('T')[0];
            const todayStr = today.toISOString().split('T')[0];
            document.getElementById('checkIn').min = todayStr;
            document.getElementById('checkOut').min = todayStr;
        })();

        ['checkIn','checkOut','roomType','guests','time'].forEach(id => {
            document.getElementById(id).addEventListener('change', checkAvailability);
        });
        document.getElementById('bookingForm').addEventListener('submit', handleBookingSubmit);

        async function checkAvailability() {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const roomType = document.getElementById('roomType').value;
            const guests = document.getElementById('guests').value;
            const time = document.getElementById('time').value;
            if (!checkIn || !checkOut || !roomType || !guests || !time) return;
            if (new Date(checkOut) <= new Date(checkIn)) {
                showMessage('Check‑out must be after check‑in', 'error');
                hidePrice();
                return;
            }
            document.getElementById('loadingIndicator').classList.add('active');
            hideMessage();
            try {
                const res = await fetch('/api/check_availability', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ check_in: checkIn, check_out: checkOut, room_type: roomType, guests: parseInt(guests), time })
                });
                const data = await res.json();
                if (data.available) {
                    displayPrice(data);
                    hideMessage();
                } else {
                    showMessage(data.message || 'No availability', 'error');
                    hidePrice();
                }
            } catch (e) {
                showMessage('Error checking availability', 'error');
                hidePrice();
            } finally {
                document.getElementById('loadingIndicator').classList.remove('active');
            }
        }

        function displayPrice(data) {
            document.getElementById('priceDisplay').style.display = 'block';
            document.getElementById('totalPrice').textContent = '$' + data.total_price.toLocaleString();
            document.getElementById('nightsCount').textContent = data.nights;
            document.getElementById('pricePerNight').textContent = '$' + data.price_per_night;
        }
        function hidePrice() { document.getElementById('priceDisplay').style.display = 'none'; }
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
        function hideMessage() {
            const msg = document.getElementById('message');
            msg.className = 'message';
            msg.textContent = '';
        }

        async function handleBookingSubmit(e) {
            e.preventDefault();
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            if (new Date(checkOut) <= new Date(checkIn)) {
                showMessage('Check‑out date must be after check‑in', 'error');
                return;
            }
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            document.getElementById('loadingIndicator').classList.add('active');
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                room_type: document.getElementById('roomType').value,
                check_in: checkIn,
                check_out: checkOut,
                time: document.getElementById('time').value,
                guests: parseInt(document.getElementById('guests').value),
                special_requests: document.getElementById('specialRequests').value
            };
            try {
                const res = await fetch('/api/create_booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await res.json();
                if (data.success) {
                    showMessage(`Reservation confirmed! Booking #${data.booking_id}. Total: $${data.total_price.toLocaleString()}`, 'success');
                    document.getElementById('bookingForm').reset();
                    (function resetDates() {
                        const today = new Date();
                        const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
                        const nextWeek = new Date(today); nextWeek.setDate(nextWeek.getDate()+7);
                        document.getElementById('checkIn').value = tomorrow.toISOString().split('T')[0];
                        document.getElementById('checkOut').value = nextWeek.toISOString().split('T')[0];
                        document.getElementById('time').value = '15:00';
                    })();
                    hidePrice();
                    setTimeout(() => { window.location.href = '/booking-confirmation'; }, 2500);
                } else {
                    showMessage(data.message || 'Booking failed.', 'error');
                }
            } catch (e) {
                showMessage('Error creating booking.', 'error');
            } finally {
                submitBtn.disabled = false;
                document.getElementById('loadingIndicator').classList.remove('active');
            }
        }
    </script>
</body>
</html>
