<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Stay | The Canyon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #F5F2EB; color: #1E1E1E; }
        nav { position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(26,26,26,0.95); }
        .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; letter-spacing: 0.3em; color: #fff; text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: #C4A962; }
        section { padding: 8rem 2rem 4rem; max-width: 1200px; margin: 0 auto; }
        .booking-form { background: #fff; padding: 3rem; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem 2rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 0.5rem; }
        .form-group.full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 0.4rem; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: #8B7355; }
        input, select, textarea { width: 100%; padding: 1rem 0.75rem; border: 1px solid #E0DCD3; font-size: 0.9rem; font-family: inherit; background: #FDFCFA; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #C4A962; }
        .price-display { background: #F5F2EB; padding: 1.5rem; margin: 1.5rem 0 2rem; text-align: center; display: none; border-radius: 8px; }
        .price-amount { font-size: 2.5rem; font-weight: 400; color: #8B7355; font-family: 'Cormorant Garamond', serif; }
        .activities-section { margin-top: 1.5rem; padding: 1rem; border: 1px solid #E0DCD3; border-radius: 8px; }
        .submit-btn { background: #C4A962; color: #fff; border: none; padding: 1rem 2rem; font-size: 0.9rem; letter-spacing: 0.3em; text-transform: uppercase; cursor: pointer; width: 100%; }
        .submit-btn:hover { background: #1A1A1A; }
        .submit-btn:disabled { background: #C8C2B8; cursor: not-allowed; }
        .message { padding: 1rem; margin: 1.5rem 0; font-size: 0.85rem; display: none; }
        .message.success { background: #E6F0E6; color: #2B5E2B; border-left: 4px solid #2B5E2B; display: block; }
        .message.error { background: #F4E6E6; color: #A12B2B; border-left: 4px solid #A12B2B; display: block; }
        .loading { display: none; text-align: center; padding: 1.5rem; }
        .loading.active { display: block; }
        .spinner { border: 2px solid #F5F2EB; border-top: 2px solid #C4A962; border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #paymentModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 2.5rem; border-radius: 8px; max-width: 500px; width: 90%; text-align: center; }
        .payment-method { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
        .payment-method label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.8rem 1.2rem; border: 2px solid #E0DCD3; border-radius: 8px; transition: 0.3s; }
        .payment-method label.active { border-color: #C4A962; background: #F5F2EB; }
        .payment-method input[type="radio"] { display: none; }
        .modal-btn { background: #C4A962; color: white; border: none; padding: 0.8rem 2rem; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; width: 100%; }
        .modal-btn:hover { background: #1A1A1A; }
        footer { background: #1A1A1A; color: #ccc; text-align: center; padding: 2rem; margin-top: 4rem; }
        footer a { color: #C4A962; text-decoration: none; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .form-group.full-width { grid-column: span 1; } }
    </style>
</head>
