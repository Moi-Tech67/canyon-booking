<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CANYON | Hotels & Resorts</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; }
        nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent); transition: background 0.3s ease; }
        nav.scrolled { background: rgba(26,26,26,0.95); }
        .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; letter-spacing: 0.3em; color: #fff; text-transform: uppercase; text-decoration: none; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #C4A962; }
        .hero { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        .hero-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; z-index: 0; }
        .hero-slide.active { opacity: 1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1; }
        .hero-content { position: relative; z-index: 2; max-width: 900px; padding: 0 2rem; }
        .hotel-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 12vw, 7rem); font-weight: 300; letter-spacing: 0.4em; text-transform: uppercase; color: #FFFFFF; margin-bottom: 0.75rem; line-height: 1.1; text-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .hotel-subtitle { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.2rem, 4vw, 2rem); font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; color: #C4A962; margin-bottom: 3.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .experience-text { font-size: 1rem; font-weight: 400; letter-spacing: 0.5em; text-transform: uppercase; color: #FFFFFF; margin-bottom: 3rem; word-spacing: 0.3em; text-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .hero-buttons { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
        .hero-btn { display: inline-block; background: transparent; border: 2px solid #C4A962; color: #FFFFFF; padding: 1rem 2.5rem; font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 500; letter-spacing: 0.4em; text-transform: uppercase; text-decoration: none; cursor: pointer; transition: all 0.3s ease; min-width: 180px; }
        .hero-btn:hover { background: #C4A962; color: #1A1A1A; }
        .hero-btn.btn-solid { background: #C4A962; color: #1A1A1A; }
        .hero-btn.btn-solid:hover { background: transparent; color: #FFFFFF; }
        @media (max-width: 768px) { nav { padding: 1rem 1.5rem; } .hero-buttons { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>
    <nav id="navbar">
    <a href="/" class="nav-logo">The Canyon</a>
    <ul class="nav-links">
        <li><a href="/about">About</a></li>
        <li><a href="/accommodation">Rooms</a></li>
        <li><a href="/booking">Book</a></li>
        <li><a href="/contact">Contact</a></li>
        {% if session.user_id %}
            <li><a href="{{ '/admin' if session.role == 'admin' else '/my-bookings' }}">Dashboard</a></li>
            <li><a href="/logout">Logout</a></li>
        {% else %}
            <li><a href="/login">Login</a></li>
        {% endif %}
    </ul>
</nav>

    <section class="hero">
        <div class="hero-slide active" style="background-image: url('https://images.pexels.com/photos/457882/pexels-photo-457882.jpeg?auto=compress&cs=tinysrgb&w=1920');"></div>
        <div class="hero-slide" style="background-image: url('https://images.pexels.com/photos/261204/pexels-photo-261204.jpeg?auto=compress&cs=tinysrgb&w=1920');"></div>
        <div class="hero-slide" style="background-image: url('https://images.pexels.com/photos/1457842/pexels-photo-1457842.jpeg?auto=compress&cs=tinysrgb&w=1920');"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hotel-name">THE CANYON</h1>
            <p class="hotel-subtitle">HOTELS & RESORTS</p>
            <p class="experience-text">EXPERIENCE THE CANYON</p>
            <div class="hero-buttons">
                <a href="/accommodation" class="hero-btn">ACCOMMODATION</a>
                <a href="/booking" class="hero-btn btn-solid">BOOK NOW</a>
            </div>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            nav.classList.toggle('scrolled', window.scrollY > 50);
        });
        (function() {
            const slides = document.querySelectorAll('.hero-slide');
            let current = 0;
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 3000);
        })();
    </script>
</body>
</html>
